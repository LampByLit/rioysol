<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Rio y Sol</title>
    <meta
      name="description"
      content="Rio y Sol protects a stretch of river near Iquitos, Peru: habitat, wildlife, and the people who care for it."
    />
    <meta name="theme-color" content="#38bdf8" />
    <meta name="msapplication-TileColor" content="#38bdf8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <section
      class="slider"
      data-i18n-aria="sliderSectionAria"
      aria-label="Featured scenes from the project"
    >
      <div class="slider__header">
        <a class="slider__menu" href="/about.html" data-i18n-aria="menuAboutAria">
          <svg
            class="slider__menu-icon"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.75"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <circle cx="12" cy="12" r="10" />
            <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20" />
            <path d="M2 12h20" />
          </svg>
        </a>
        <div class="slider__header-right">
          <span class="slider__label" data-i18n="brandLocation">Rio y Sol, Iquitos, Peru</span>
          <div
            class="lang-toggle lang-toggle--slider"
            role="group"
            data-i18n-aria="langSwitcherAria"
            aria-label="Language"
          >
            <button type="button" class="lang-toggle__btn" data-lang="en">EN</button>
            <button type="button" class="lang-toggle__btn" data-lang="es">ES</button>
          </div>
        </div>
      </div>

      <div class="slider__body">
        <div class="slider__left">
          <h1 class="slider__title" aria-live="polite"></h1>
          <div class="slider__footer">
            <p class="slider__description" data-i18n-html="homeTaglineHtml">
              River conservation on a living <br />
              stretch of the&nbsp;Amazon.
            </p>
          </div>
        </div>
        <div class="slider__right">
          <div class="slider__images"></div>
        </div>
      </div>
    </section>

    <script src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>
    <script src="/js/i18n.js"></script>
    <script src="/js/main.js"></script>
  </body>
</html>
